{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arron - Acceso</title>
    <link rel="stylesheet" href="{% static 'css/iniciosesion.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="circle shape1"></div>
    <div class="circle shape2"></div>

    <main class="main-wrapper">
        <div class="glass-card">
            
            <section class="info-side">
                <div class="content">
                    <h1>¡Bienvenido!</h1>
                    <p>Gestiona tus proyectos con la eficiencia de Arron.</p>
                    <div class="register-prompt">
                        <span>¿No tienes cuenta?</span>
                        <a href="{% url 'registro' %}" class="btn-outline">Crear cuenta</a>
                    </div>
                </div>
            </section>

            <section class="form-side">
                <div class="form-header">
                    <h2>Iniciar Sesión</h2>
                    <p>Ingresa tus credenciales para continuar</p>
                </div>

                {% if error %}
                <div class="alert error-alert">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="input-box">
                        <label>Documento</label>
                        <div class="input-field">
                            <i class="fa-solid fa-id-card"></i>
                            <input type="number" id="numero_documento" name="numero_documento" placeholder="Ej. 12345678" min="0" oninput="if(this.value < 0) this.value = 0;" required value="{{ numero_documento }}">
                        </div>
                    </div>

                    <div class="input-box">
                        <label>Contraseña</label>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" name="contrasena" placeholder="••••••••" required>
                            <i id="eyeIcon" class="fa-solid fa-eye toggle-pass" onclick="togglePassword()"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">
                        Acceder <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    
                    <a href="/" class="back-link">Volver al inicio</a>
                </form>
            </section>
        </div>
    </main>

    <script>
        function togglePassword(){
            const password = document.getElementById("password");
            const icon = document.getElementById("eyeIcon");
            if(password.type === "password"){
                password.type = "text";
                icon.classList.replace("fa-eye","fa-eye-slash");
            } else {
                password.type = "password";
                icon.classList.replace("fa-eye-slash","fa-eye");
            }
        }

        // Bloqueo estricto de caracteres extraños (e, E, +, -, .) en el documento
        const documentoInput = document.getElementById('numero_documento');
        documentoInput.addEventListener('keydown', function(e) {
            if (['-', '+', 'e', 'E', '.', ','].includes(e.key)) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
