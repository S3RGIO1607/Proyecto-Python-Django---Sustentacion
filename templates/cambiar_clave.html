{% extends "base2.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-20 px-6 py-10 bg-white shadow-2xl rounded-[2.5rem] border border-gray-100">
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-amber-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-key text-2xl text-amber-600"></i>
        </div>
        <h2 class="text-2xl font-black text-gray-900 tracking-tighter">SEGURIDAD</h2>
        <p class="text-sm text-gray-400 font-medium">Actualiza tu contraseña de acceso</p>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-2">Contraseña Actual</label>
            <input type="password" name="clave_actual" required 
                class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-amber-500 transition-all outline-none text-sm">
        </div>

        <div class="border-t border-gray-50 pt-6">
            <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-2">Nueva Contraseña</label>
            <input type="password" name="nueva_clave" required 
                class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-amber-500 transition-all outline-none text-sm mb-4">
            
            <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-2">Confirmar Nueva Contraseña</label>
            <input type="password" name="confirmar_clave" required 
                class="w-full px-5 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-amber-500 transition-all outline-none text-sm">
        </div>

        <button type="submit" 
            class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
            Actualizar Contraseña
        </button>
        
        <a href="javascript:history.back()" class="block text-center text-xs font-bold text-gray-400 hover:text-gray-600 transition-colors uppercase tracking-widest mt-4">
            Cancelar
        </a>
    </form>
</div>
{% endblock %}
